    <title>रामधुन रैली - पोस्टर जनरेटर</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='54' font-size='56'%3E%F0%9F%9A%A9%3C/text%3E%3C/svg%3E" type="image/svg+xml">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1c1008;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(230,120,20,0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 0% 100%, rgba(180,80,0,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 100% 100%, rgba(200,100,10,0.08) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 12px;
            position: relative;
        }

        h1 {
            color: #fff; text-align: center; margin-bottom: 4px; font-size: clamp(1.1rem, 4.5vw, 1.8rem);
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
            position: relative; z-index: 1;
            padding: 0 8px;
        }
        .subtitle {
            color: #e8944a; text-align: center; margin-bottom: 20px;
            font-size: clamp(0.8rem, 3vw, 1rem);
            position: relative; z-index: 1;
            letter-spacing: 0.5px;
        }

        .container {
            display: flex; gap: 30px;
            justify-content: center; width: 100%; max-width: 1200px;
            position: relative; z-index: 1;
            align-items: flex-start;
        }

        .form-panel {
            background: #241a10;
            border-radius: 16px; padding: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            width: 360px; flex-shrink: 0;
            border: 1px solid #3a2a18;
        }

        .form-panel h2 {
            color: #e8944a; margin-bottom: 20px; font-size: 1.2rem;
            border-bottom: 2px solid #e8944a; padding-bottom: 8px;
        }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; margin-bottom: 6px;
            font-weight: 600; color: #cca070; font-size: 0.95rem;
        }

        .form-group input[type="text"] {
            width: 100%; padding: 10px 14px;
            border: 1px solid #3a2a18;
            border-radius: 8px; font-size: 1rem;
            background: #1a1208; color: #f0dcc4;
            transition: border-color 0.2s;
        }
        .form-group input[type="text"]::placeholder { color: #6a5540; }
        .form-group input[type="text"]:focus {
            outline: none; border-color: #e8944a;
            box-shadow: 0 0 0 3px rgba(232,148,74,0.15);
        }

        .photo-upload {
            border: 2px dashed #3a2a18; border-radius: 12px; padding: 20px;
            text-align: center; cursor: pointer;
            background: #1a1208; position: relative;
            transition: all 0.2s;
        }
        .photo-upload:hover {
            border-color: #e8944a; background: #221810;
        }
        .photo-upload input[type="file"] {
            position: absolute; inset: 0; opacity: 0; cursor: pointer;
        }
        .photo-upload .placeholder { color: #8a7060; font-size: 0.9rem; }
        .photo-upload .placeholder span { font-size: 2.5rem; display: block; margin-bottom: 6px; }

        /* Cropper Modal */
        .cropper-overlay {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.92);
            flex-direction: column; align-items: center; justify-content: center;
            padding: 16px;
        }
        .cropper-overlay.active { display: flex; }
        .cropper-title {
            color: #fff; font-size: 1.1rem; font-weight: 600; margin-bottom: 12px;
            text-align: center;
        }
        .cropper-container {
            position: relative; overflow: hidden;
            width: min(90vw, 400px);
            border-radius: 12px; touch-action: none;
            cursor: grab;
        }
        .cropper-container:active { cursor: grabbing; }
        .cropper-canvas {
            display: block; width: 100%; height: auto;
            border-radius: 12px;
        }
        .cropper-controls {
            margin-top: 16px; width: min(90vw, 400px);
            display: flex; flex-direction: column; gap: 12px; align-items: center;
        }
        .cropper-controls label {
            font-size: 0.9rem; color: #cca070; font-weight: 600;
            display: flex; align-items: center; gap: 10px; width: 100%;
        }
        .cropper-controls input[type="range"] {
            flex: 1; accent-color: #e8944a;
        }
        .cropper-controls .zoom-value {
            font-size: 0.8rem; color: #e8944a; min-width: 36px; text-align: right;
        }
        .cropper-btn-row {
            display: flex; gap: 10px; width: 100%;
        }
        .btn-cropper {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
        }
        .btn-cropper-done {
            background: #e8944a; color: #1a0e04;
        }
        .btn-cropper-done:hover { background: #f0a050; }
        .btn-cropper-reset {
            background: transparent; color: #cca070;
            border: 1px solid #3a2a18;
        }
        .btn-cropper-reset:hover { border-color: #e8944a; color: #e8944a; }
        .btn-adjust {
            width: 100%; padding: 10px; border: 1px solid #3a2a18; border-radius: 8px;
            background: #1a1208; color: #cca070; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s; margin-top: 8px;
            display: none;
        }
        .btn-adjust.active { display: block; }
        .btn-adjust:hover { border-color: #e8944a; color: #e8944a; background: #221810; }

        .gender-toggle {
            display: flex; gap: 0; border-radius: 8px; overflow: hidden;
            border: 1px solid #3a2a18;
        }
        .gender-toggle input[type="radio"] { display: none; }
        .gender-toggle label {
            flex: 1; padding: 10px 0; text-align: center;
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
            background: #1a1208; color: #6a5540;
            transition: all 0.2s;
            display: block; margin-bottom: 0;
        }
        .gender-toggle input[type="radio"]:checked + label {
            background: #e8944a; color: #1a0e04;
        }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px;
            transition: all 0.2s;
        }
        .btn-download {
            background: #e8944a; color: #1a0e04;
        }
        .btn-download:hover {
            background: #f0a050;
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(232,148,74,0.3);
        }
        .btn-download:disabled {
            background: #2a2018; color: #5a4a3a;
            cursor: not-allowed; transform: none;
        }

        .preview-panel {
            background: #241a10;
            border-radius: 16px; padding: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            border: 1px solid #3a2a18;
            display: flex; flex-direction: column; align-items: center;
            flex: 1; min-width: 0;
        }
        .preview-panel h2 {
            color: #e8944a; margin-bottom: 16px; font-size: 1.2rem;
            border-bottom: 2px solid #e8944a; padding-bottom: 8px; width: 100%;
        }

        .canvas-wrapper {
            position: relative; user-select: none;
            width: 100%;
        }

        #previewCanvas {
            width: 100%; height: auto;
            border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .msg {
            margin-top: 10px; padding: 8px 12px; border-radius: 8px;
            font-size: 0.85rem; text-align: center; display: none;
        }
        .msg.error { background: rgba(200,50,50,0.15); color: #e06050; display: block; }
        .msg.success { background: rgba(50,180,80,0.12); color: #50c070; display: block; }

        .site-footer {
            margin-top: 40px; padding: 16px 20px;
            text-align: center; font-size: 0.8rem;
            color: #5a4a3a;
            border-top: 1px solid #3a2a18;
            width: 100%; max-width: 1200px;
            position: relative; z-index: 1;
        }
        .site-footer a {
            color: #e8944a; text-decoration: none;
        }
        .site-footer a:hover {
            color: #f0a050; text-decoration: underline;
        }

        @media (max-width: 768px) {
            body { padding: 12px 8px; }
            .container {
                flex-direction: column-reverse; align-items: center;
                gap: 16px;
            }
            .form-panel, .preview-panel {
                width: 100%; max-width: 100%;
                border-radius: 12px; padding: 16px;
            }
            .form-panel h2 { font-size: 1.1rem; margin-bottom: 14px; }
            .form-group { margin-bottom: 12px; }
            .form-group input[type="text"] { padding: 10px 12px; font-size: 16px; }
            .photo-upload { padding: 16px; }
            .btn { padding: 14px; font-size: 1.05rem; }
            .preview-panel { padding: 12px; }
            .preview-panel h2 { font-size: 1rem; margin-bottom: 10px; }
            .site-footer { margin-top: 24px; padding: 12px 8px; font-size: 0.75rem; }
        }

        @media (max-width: 380px) {
            h1 { font-size: 1rem; }
            .form-panel, .preview-panel { padding: 12px; }
            .form-group input[type="text"] { padding: 8px 10px; }
        }
    </style>
</head>
<body>
    <h1>पूर्व नागपुर (लकडगंज) रामजन्मोत्सव समिती</h1>
    <p class="subtitle">रामनवमी रामधुन रैली - पोस्टर जनरेटर</p>

    <div class="container">
        <div class="form-panel">
            <h2>माहिती भरा</h2>

            <div class="form-group">
                <label>पोस्टर प्रकार / Poster Type</label>
                <div class="gender-toggle">
                    <input type="radio" name="gender" id="genderMale" value="male" checked>
                    <label for="genderMale">पुरुष / Male</label>
                    <input type="radio" name="gender" id="genderFemale" value="female">
                    <label for="genderFemale">महिला / Female</label>
                </div>
            </div>

            <div class="form-group">
                <label for="devoteeName">आपका नाम / Your Name</label>
                <input type="text" id="devoteeName" placeholder="नाम लिखें...">
            </div>

            <div class="form-group">
                <label>आपका फोटो / Your Photo</label>
                <div class="photo-upload" id="photoUploadArea">
                    <input type="file" id="devoteePhoto" accept="image/*">
                    <div class="placeholder" id="photoPlaceholder">
                        <span>📷</span>
                        फोटो अपलोड करा<br><small>टॅप करा / Tap to upload</small>
                    </div>
                </div>
            </div>

            <button class="btn-adjust" id="adjustBtn" onclick="openCropper()">फोटो सेट करा / Adjust Photo</button>

            <button class="btn btn-download" id="downloadBtn" onclick="downloadPoster()" disabled>डाउनलोड करा</button>

            <div class="msg" id="msgBox"></div>
        </div>

        <div class="preview-panel">
            <h2>पोस्टर प्रीव्यू</h2>
            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="previewCanvas" width="1080" height="1920"></canvas>
            </div>
        </div>
    </div>

    <!-- Photo Cropper Modal -->
    <div class="cropper-overlay" id="cropperOverlay">
        <p class="cropper-title">फोटो सेट करा / Adjust Photo</p>
        <div class="cropper-container" id="cropperContainer">
            <canvas class="cropper-canvas" id="cropperCanvas" width="600" height="648"></canvas>
        </div>
        <div class="cropper-controls">
            <label>Zoom
                <input type="range" id="cropperZoom" min="100" max="300" value="100" step="1">
                <span class="zoom-value" id="cropperZoomValue">100%</span>
            </label>
            <div class="cropper-btn-row">
                <button class="btn-cropper btn-cropper-reset" onclick="cropperReset()">Re-center</button>
                <button class="btn-cropper btn-cropper-done" onclick="closeCropper()">Done</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('canvasWrapper');

        // Photo box: rounded rectangle
        const BOX = { x: 694, y: 1372, w: 314, h: 339, r: 40 };
        // Name banner interior
        const NAME_BOX = { x: 80, y: 1602, w: 555, h: 107 };
        const NAME_CENTER = { x: 357, y: 1655 };

        let templateImg = null;
        let templateMaleImg = null;
        let templateFemaleImg = null;
        let devoteeImg = null;

        // Image transform state
        let imgOffsetX = 0;
        let imgOffsetY = 0;
        let imgScale = 1;

        // Load both templates
        let templatesLoaded = 0;
        function onTemplateLoad() {
            templatesLoaded++;
            if (templatesLoaded >= 2) {
                templateImg = templateMaleImg;
                render();
            }
        }
        templateMaleImg = new Image();
        templateMaleImg.onload = onTemplateLoad;
        templateMaleImg.src = 'template.png';

        templateFemaleImg = new Image();
        templateFemaleImg.onload = onTemplateLoad;
        templateFemaleImg.src = 'template-female.png';

        // Gender toggle
        document.querySelectorAll('input[name="gender"]').forEach(radio => {
            radio.addEventListener('change', function() {
                templateImg = this.value === 'female' ? templateFemaleImg : templateMaleImg;
                render();
            });
        });

        // Photo upload
        document.getElementById('devoteePhoto').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                devoteeImg = new Image();
                devoteeImg.onload = () => {
                    autoFit();
                    document.getElementById('photoPlaceholder').style.display = 'none';
                    document.getElementById('adjustBtn').classList.add('active');
                    render();
                    openCropper();
                };
                devoteeImg.src = evt.target.result;
            };
            reader.readAsDataURL(file);
        });

        function autoFit() {
            if (!devoteeImg) return;
            const scaleX = BOX.w / devoteeImg.width;
            const scaleY = BOX.h / devoteeImg.height;
            imgScale = Math.max(scaleX, scaleY);
            const drawW = devoteeImg.width * imgScale;
            const drawH = devoteeImg.height * imgScale;
            imgOffsetX = (BOX.w - drawW) / 2;
            imgOffsetY = (BOX.h - drawH) / 2;
        }

        function getBaseScale() {
            const scaleX = BOX.w / devoteeImg.width;
            const scaleY = BOX.h / devoteeImg.height;
            return Math.max(scaleX, scaleY);
        }

        function constrainOffset() {
            if (!devoteeImg) return;
            const drawW = devoteeImg.width * imgScale;
            const drawH = devoteeImg.height * imgScale;
            if (drawW >= BOX.w) {
                imgOffsetX = Math.min(0, Math.max(BOX.w - drawW, imgOffsetX));
            } else {
                imgOffsetX = (BOX.w - drawW) / 2;
            }
            if (drawH >= BOX.h) {
                imgOffsetY = Math.min(0, Math.max(BOX.h - drawH, imgOffsetY));
            } else {
                imgOffsetY = (BOX.h - drawH) / 2;
            }
        }

        // ==================== CROPPER MODAL ====================
        const cropperCanvas = document.getElementById('cropperCanvas');
        const cropperCtx = cropperCanvas.getContext('2d');
        const cropperContainer = document.getElementById('cropperContainer');
        const cropperOverlay = document.getElementById('cropperOverlay');
        const cropperZoomSlider = document.getElementById('cropperZoom');

        // Cropper canvas maps to a larger view of the BOX area with padding
        const CROP_PAD = 40; // padding around the crop frame in cropper-canvas pixels
        // Cropper canvas size is set to show the BOX aspect ratio with padding
        const CROP_FRAME_W = 600 - CROP_PAD * 2; // 520
        const CROP_FRAME_H = Math.round(CROP_FRAME_W * (BOX.h / BOX.w)); // maintain aspect ratio
        const CROP_CANVAS_W = 600;
        const CROP_CANVAS_H = CROP_FRAME_H + CROP_PAD * 2;

        // Scale factor: how cropper pixels map to BOX pixels
        const CROP_SCALE = CROP_FRAME_W / BOX.w;

        cropperCanvas.width = CROP_CANVAS_W;
        cropperCanvas.height = CROP_CANVAS_H;

        let cropperDragging = false;
        let cropperDragStartX = 0, cropperDragStartY = 0;
        let cropperDragStartOffX = 0, cropperDragStartOffY = 0;
        let cropperPinchDist = 0, cropperPinchStartZoom = 100;

        function openCropper() {
            if (!devoteeImg) return;
            cropperZoomSlider.value = Math.round((imgScale / getBaseScale()) * 100);
            updateCropperZoomDisplay();
            cropperOverlay.classList.add('active');
            renderCropper();
        }

        function closeCropper() {
            cropperOverlay.classList.remove('active');
            render();
        }

        function cropperReset() {
            autoFit();
            cropperZoomSlider.value = 100;
            updateCropperZoomDisplay();
            renderCropper();
            render();
        }

        function updateCropperZoomDisplay() {
            document.getElementById('cropperZoomValue').textContent = cropperZoomSlider.value + '%';
        }

        function applyCropperZoom(val) {
            if (!devoteeImg) return;
            val = Math.max(100, Math.min(300, val));
            cropperZoomSlider.value = val;
            updateCropperZoomDisplay();

            const baseScale = getBaseScale();
            const newScale = baseScale * (val / 100);

            const oldDrawW = devoteeImg.width * imgScale;
            const oldDrawH = devoteeImg.height * imgScale;
            const newDrawW = devoteeImg.width * newScale;
            const newDrawH = devoteeImg.height * newScale;

            const oldCX = imgOffsetX + oldDrawW / 2;
            const oldCY = imgOffsetY + oldDrawH / 2;
            imgOffsetX = oldCX - newDrawW / 2;
            imgOffsetY = oldCY - newDrawH / 2;
            imgScale = newScale;

            constrainOffset();
            renderCropper();
            render();
        }

        cropperZoomSlider.addEventListener('input', function() {
            applyCropperZoom(parseInt(this.value));
        });

        function renderCropper() {
            if (!devoteeImg) return;
            const ctx2 = cropperCtx;
            const cw = CROP_CANVAS_W;
            const ch = CROP_CANVAS_H;

            // Clear
            ctx2.clearRect(0, 0, cw, ch);

            // Draw the photo scaled up into the cropper view
            const drawW = devoteeImg.width * imgScale * CROP_SCALE;
            const drawH = devoteeImg.height * imgScale * CROP_SCALE;
            const photoX = CROP_PAD + imgOffsetX * CROP_SCALE;
            const photoY = CROP_PAD + imgOffsetY * CROP_SCALE;

            ctx2.drawImage(devoteeImg, photoX, photoY, drawW, drawH);

            // Dark overlay outside the crop frame
            ctx2.fillStyle = 'rgba(0,0,0,0.6)';
            // Top
            ctx2.fillRect(0, 0, cw, CROP_PAD);
            // Bottom
            ctx2.fillRect(0, CROP_PAD + CROP_FRAME_H, cw, CROP_PAD);
            // Left
            ctx2.fillRect(0, CROP_PAD, CROP_PAD, CROP_FRAME_H);
            // Right
            ctx2.fillRect(CROP_PAD + CROP_FRAME_W, CROP_PAD, CROP_PAD, CROP_FRAME_H);

            // Crop frame border
            ctx2.strokeStyle = '#e8944a';
            ctx2.lineWidth = 2;
            ctx2.strokeRect(CROP_PAD, CROP_PAD, CROP_FRAME_W, CROP_FRAME_H);

            // Corner markers
            const cornerLen = 20;
            ctx2.strokeStyle = '#fff';
            ctx2.lineWidth = 3;
            // Top-left
            ctx2.beginPath(); ctx2.moveTo(CROP_PAD, CROP_PAD + cornerLen); ctx2.lineTo(CROP_PAD, CROP_PAD); ctx2.lineTo(CROP_PAD + cornerLen, CROP_PAD); ctx2.stroke();
            // Top-right
            ctx2.beginPath(); ctx2.moveTo(CROP_PAD + CROP_FRAME_W - cornerLen, CROP_PAD); ctx2.lineTo(CROP_PAD + CROP_FRAME_W, CROP_PAD); ctx2.lineTo(CROP_PAD + CROP_FRAME_W, CROP_PAD + cornerLen); ctx2.stroke();
            // Bottom-left
            ctx2.beginPath(); ctx2.moveTo(CROP_PAD, CROP_PAD + CROP_FRAME_H - cornerLen); ctx2.lineTo(CROP_PAD, CROP_PAD + CROP_FRAME_H); ctx2.lineTo(CROP_PAD + cornerLen, CROP_PAD + CROP_FRAME_H); ctx2.stroke();
            // Bottom-right
            ctx2.beginPath(); ctx2.moveTo(CROP_PAD + CROP_FRAME_W - cornerLen, CROP_PAD + CROP_FRAME_H); ctx2.lineTo(CROP_PAD + CROP_FRAME_W, CROP_PAD + CROP_FRAME_H); ctx2.lineTo(CROP_PAD + CROP_FRAME_W, CROP_PAD + CROP_FRAME_H - cornerLen); ctx2.stroke();
        }

        function getCropperScale() {
            return cropperCanvas.width / cropperContainer.getBoundingClientRect().width;
        }

        // Mouse drag in cropper
        cropperContainer.addEventListener('mousedown', (e) => {
            cropperDragging = true;
            cropperDragStartX = e.clientX;
            cropperDragStartY = e.clientY;
            cropperDragStartOffX = imgOffsetX;
            cropperDragStartOffY = imgOffsetY;
            e.preventDefault();
        });
        window.addEventListener('mousemove', (e) => {
            if (!cropperDragging) return;
            const s = getCropperScale() / CROP_SCALE;
            imgOffsetX = cropperDragStartOffX + (e.clientX - cropperDragStartX) * s;
            imgOffsetY = cropperDragStartOffY + (e.clientY - cropperDragStartY) * s;
            constrainOffset();
            renderCropper();
            render();
        });
        window.addEventListener('mouseup', () => { cropperDragging = false; });

        // Touch drag + pinch in cropper
        function getTouchDist(t1, t2) {
            const dx = t1.clientX - t2.clientX;
            const dy = t1.clientY - t2.clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        cropperContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                cropperDragging = true;
                cropperDragStartX = e.touches[0].clientX;
                cropperDragStartY = e.touches[0].clientY;
                cropperDragStartOffX = imgOffsetX;
                cropperDragStartOffY = imgOffsetY;
                cropperPinchDist = 0;
            } else if (e.touches.length === 2) {
                cropperDragging = false;
                cropperPinchDist = getTouchDist(e.touches[0], e.touches[1]);
                cropperPinchStartZoom = parseInt(cropperZoomSlider.value);
            }
            e.preventDefault();
        }, { passive: false });

        cropperContainer.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && cropperPinchDist > 0) {
                const newDist = getTouchDist(e.touches[0], e.touches[1]);
                const ratio = newDist / cropperPinchDist;
                applyCropperZoom(Math.round(cropperPinchStartZoom * ratio));
                e.preventDefault();
                return;
            }
            if (e.touches.length === 1 && cropperDragging) {
                const s = getCropperScale() / CROP_SCALE;
                imgOffsetX = cropperDragStartOffX + (e.touches[0].clientX - cropperDragStartX) * s;
                imgOffsetY = cropperDragStartOffY + (e.touches[0].clientY - cropperDragStartY) * s;
                constrainOffset();
                renderCropper();
                render();
            }
            e.preventDefault();
        }, { passive: false });

        cropperContainer.addEventListener('touchend', (e) => {
            if (e.touches.length === 0) cropperDragging = false;
            if (e.touches.length < 2) cropperPinchDist = 0;
        });

        // Mouse wheel zoom in cropper
        cropperContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            let val = parseInt(cropperZoomSlider.value);
            val += e.deltaY < 0 ? 5 : -5;
            applyCropperZoom(val);
        }, { passive: false });

        function roundedRectPath(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.arcTo(x + w, y, x + w, y + r, r);
            ctx.lineTo(x + w, y + h - r);
            ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
            ctx.lineTo(x + r, y + h);
            ctx.arcTo(x, y + h, x, y + h - r, r);
            ctx.lineTo(x, y + r);
            ctx.arcTo(x, y, x + r, y, r);
            ctx.closePath();
        }

        function render() {
            if (!templateImg || !templateImg.complete) return;

            const name = document.getElementById('devoteeName').value.trim();

            // Draw template
            ctx.drawImage(templateImg, 0, 0, 1080, 1920);

            // Draw devotee photo clipped to rounded rect
            if (devoteeImg) {
                ctx.save();
                roundedRectPath(ctx, BOX.x, BOX.y, BOX.w, BOX.h, BOX.r);
                ctx.clip();

                const drawW = devoteeImg.width * imgScale;
                const drawH = devoteeImg.height * imgScale;
                ctx.drawImage(
                    devoteeImg,
                    BOX.x + imgOffsetX,
                    BOX.y + imgOffsetY,
                    drawW,
                    drawH
                );
                ctx.restore();

                // Redraw template border around photo box so frame appears on top
                ctx.save();
                // Create a path that is the full canvas MINUS the photo box interior (inset by border width)
                ctx.beginPath();
                ctx.rect(0, 0, 1080, 1920);
                // Cut out a slightly smaller rounded rect (the photo interior)
                roundedRectPath(ctx, BOX.x + 4, BOX.y + 4, BOX.w - 8, BOX.h - 8, BOX.r - 4);
                ctx.clip('evenodd');
                ctx.drawImage(templateImg, 0, 0, 1080, 1920);
                ctx.restore();
            }

            // Draw name on the red banner
            if (name) {
                // Auto-size: start at 42px, shrink to fit within banner width
                let fontSize = 42;
                ctx.font = 'bold ' + fontSize + 'px "Segoe UI", Arial, sans-serif';
                while (ctx.measureText(name).width > NAME_BOX.w - 20 && fontSize > 16) {
                    fontSize--;
                    ctx.font = 'bold ' + fontSize + 'px "Segoe UI", Arial, sans-serif';
                }
                ctx.fillStyle = '#ffffff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 2;
                ctx.strokeText(name, NAME_CENTER.x, NAME_CENTER.y);
                ctx.fillText(name, NAME_CENTER.x, NAME_CENTER.y);
            }

            document.getElementById('downloadBtn').disabled = false;
        }

        function showMsg(text, type) {
            const box = document.getElementById('msgBox');
            box.textContent = text;
            box.className = 'msg ' + type;
            setTimeout(() => { box.className = 'msg'; }, 3000);
        }

        function downloadPoster() {
            const name = document.getElementById('devoteeName').value.trim() || 'poster';
            const link = document.createElement('a');
            link.download = 'Ramdhun_Rally_' + name.replace(/\s+/g, '_') + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            showMsg('पोस्टर डाउनलोड झाले!', 'success');
        }

        // Auto-render on text input
        document.getElementById('devoteeName').addEventListener('input', render);
    </script>
