    <title>रामधुन रैली - पोस्टर जनरेटर</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='54' font-size='56'%3E%F0%9F%9A%A9%3C/text%3E%3C/svg%3E" type="image/svg+xml">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1c1008;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(230,120,20,0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 0% 100%, rgba(180,80,0,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 100% 100%, rgba(200,100,10,0.08) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 12px;
            position: relative;
        }

        h1 {
            color: #fff; text-align: center; margin-bottom: 4px; font-size: clamp(1.1rem, 4.5vw, 1.8rem);
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
            position: relative; z-index: 1;
            padding: 0 8px;
        }
        .subtitle {
            color: #e8944a; text-align: center; margin-bottom: 20px;
            font-size: clamp(0.8rem, 3vw, 1rem);
            position: relative; z-index: 1;
            letter-spacing: 0.5px;
        }

        .container {
            display: flex; gap: 30px;
            justify-content: center; width: 100%; max-width: 1200px;
            position: relative; z-index: 1;
            align-items: flex-start;
        }

        .form-panel {
            background: #241a10;
            border-radius: 16px; padding: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            width: 360px; flex-shrink: 0;
            border: 1px solid #3a2a18;
        }

        .form-panel h2 {
            color: #e8944a; margin-bottom: 20px; font-size: 1.2rem;
            border-bottom: 2px solid #e8944a; padding-bottom: 8px;
        }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; margin-bottom: 6px;
            font-weight: 600; color: #cca070; font-size: 0.95rem;
        }

        .form-group input[type="text"] {
            width: 100%; padding: 10px 14px;
            border: 1px solid #3a2a18;
            border-radius: 8px; font-size: 1rem;
            background: #1a1208; color: #f0dcc4;
            transition: border-color 0.2s;
        }
        .form-group input[type="text"]::placeholder { color: #6a5540; }
        .form-group input[type="text"]:focus {
            outline: none; border-color: #e8944a;
            box-shadow: 0 0 0 3px rgba(232,148,74,0.15);
        }

        .photo-upload {
            border: 2px dashed #3a2a18; border-radius: 12px; padding: 20px;
            text-align: center; cursor: pointer;
            background: #1a1208; position: relative;
            transition: all 0.2s;
        }
        .photo-upload:hover {
            border-color: #e8944a; background: #221810;
        }
        .photo-upload input[type="file"] {
            position: absolute; inset: 0; opacity: 0; cursor: pointer;
        }
        .photo-upload .placeholder { color: #8a7060; font-size: 0.9rem; }
        .photo-upload .placeholder span { font-size: 2.5rem; display: block; margin-bottom: 6px; }

        .image-controls {
            margin-top: 12px; padding: 12px;
            background: #1a1208;
            border-radius: 10px; border: 1px solid #3a2a18;
            display: none;
        }
        .image-controls.active { display: block; }
        .image-controls label {
            font-size: 0.85rem; color: #cca070; font-weight: 600;
            display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
        }
        .image-controls input[type="range"] {
            flex: 1; accent-color: #e8944a;
        }
        .image-controls .zoom-value {
            font-size: 0.8rem; color: #e8944a; min-width: 36px; text-align: right;
        }
        .image-controls .hint {
            font-size: 0.75rem; color: #6a5540; margin-top: 4px;
        }
        .image-controls .btn-row {
            display: flex; gap: 8px; margin-top: 8px;
        }
        .btn-reset {
            flex: 1; padding: 8px; border: 1px solid #3a2a18; border-radius: 8px;
            background: #1a1208; color: #cca070; font-size: 0.85rem;
            cursor: pointer; font-weight: 600; transition: all 0.2s;
        }
        .btn-reset:hover {
            border-color: #e8944a; color: #e8944a; background: #221810;
        }
        .canvas-wrapper.dragging-photo {
            cursor: grabbing;
        }

        .gender-toggle {
            display: flex; gap: 0; border-radius: 8px; overflow: hidden;
            border: 1px solid #3a2a18;
        }
        .gender-toggle input[type="radio"] { display: none; }
        .gender-toggle label {
            flex: 1; padding: 10px 0; text-align: center;
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
            background: #1a1208; color: #6a5540;
            transition: all 0.2s;
            display: block; margin-bottom: 0;
        }
        .gender-toggle input[type="radio"]:checked + label {
            background: #e8944a; color: #1a0e04;
        }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px;
            transition: all 0.2s;
        }
        .btn-download {
            background: #e8944a; color: #1a0e04;
        }
        .btn-download:hover {
            background: #f0a050;
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(232,148,74,0.3);
        }
        .btn-download:disabled {
            background: #2a2018; color: #5a4a3a;
            cursor: not-allowed; transform: none;
        }

        .preview-panel {
            background: #241a10;
            border-radius: 16px; padding: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            border: 1px solid #3a2a18;
            display: flex; flex-direction: column; align-items: center;
            flex: 1; min-width: 0;
        }
        .preview-panel h2 {
            color: #e8944a; margin-bottom: 16px; font-size: 1.2rem;
            border-bottom: 2px solid #e8944a; padding-bottom: 8px; width: 100%;
        }

        .canvas-wrapper {
            position: relative; cursor: grab; user-select: none;
            width: 100%;
        }
        .canvas-wrapper:active { cursor: grabbing; }

        #previewCanvas {
            width: 100%; height: auto;
            border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .msg {
            margin-top: 10px; padding: 8px 12px; border-radius: 8px;
            font-size: 0.85rem; text-align: center; display: none;
        }
        .msg.error { background: rgba(200,50,50,0.15); color: #e06050; display: block; }
        .msg.success { background: rgba(50,180,80,0.12); color: #50c070; display: block; }

        .site-footer {
            margin-top: 40px; padding: 16px 20px;
            text-align: center; font-size: 0.8rem;
            color: #5a4a3a;
            border-top: 1px solid #3a2a18;
            width: 100%; max-width: 1200px;
            position: relative; z-index: 1;
        }
        .site-footer a {
            color: #e8944a; text-decoration: none;
        }
        .site-footer a:hover {
            color: #f0a050; text-decoration: underline;
        }

        @media (max-width: 768px) {
            body { padding: 12px 8px; }
            .container {
                flex-direction: column-reverse; align-items: center;
                gap: 16px;
            }
            .form-panel, .preview-panel {
                width: 100%; max-width: 100%;
                border-radius: 12px; padding: 16px;
            }
            .form-panel h2 { font-size: 1.1rem; margin-bottom: 14px; }
            .form-group { margin-bottom: 12px; }
            .form-group input[type="text"] { padding: 10px 12px; font-size: 16px; }
            .photo-upload { padding: 16px; }
            .btn { padding: 14px; font-size: 1.05rem; }
            .preview-panel { padding: 12px; }
            .preview-panel h2 { font-size: 1rem; margin-bottom: 10px; }
            .image-controls { padding: 10px; }
            .image-controls .hint { font-size: 0.7rem; }
            .site-footer { margin-top: 24px; padding: 12px 8px; font-size: 0.75rem; }
        }

        @media (max-width: 380px) {
            h1 { font-size: 1rem; }
            .form-panel, .preview-panel { padding: 12px; }
            .form-group input[type="text"] { padding: 8px 10px; }
        }
    </style>
</head>
<body>
    <h1>पूर्व नागपुर (लकडगंज) रामजन्मोत्सव समिती</h1>
    <p class="subtitle">रामनवमी रामधुन रैली - पोस्टर जनरेटर</p>

    <div class="container">
        <div class="form-panel">
            <h2>माहिती भरा</h2>

            <div class="form-group">
                <label>पोस्टर प्रकार / Poster Type</label>
                <div class="gender-toggle">
                    <input type="radio" name="gender" id="genderMale" value="male" checked>
                    <label for="genderMale">पुरुष / Male</label>
                    <input type="radio" name="gender" id="genderFemale" value="female">
                    <label for="genderFemale">महिला / Female</label>
                </div>
            </div>

            <div class="form-group">
                <label for="devoteeName">आपका नाम / Your Name</label>
                <input type="text" id="devoteeName" placeholder="नाम लिखें...">
            </div>

            <div class="form-group">
                <label>आपका फोटो / Your Photo</label>
                <div class="photo-upload" id="photoUploadArea">
                    <input type="file" id="devoteePhoto" accept="image/*">
                    <div class="placeholder" id="photoPlaceholder">
                        <span>📷</span>
                        फोटो अपलोड करा<br><small>टॅप करा / Tap to upload</small>
                    </div>
                </div>
            </div>

            <div class="image-controls" id="imageControls">
                <label>Zoom / आकार बदला
                    <input type="range" id="zoomSlider" min="50" max="300" value="100" step="1">
                    <span class="zoom-value" id="zoomValue">100%</span>
                </label>
                <div class="btn-row">
                    <button class="btn-reset" onclick="resetImage()">Re-center</button>
                    <button class="btn-reset" onclick="fitToFill()">Fill Box</button>
                </div>
                <p class="hint">Preview वर ड्रॅग करा फोटो हलवण्यासाठी | Pinch to zoom (Mobile) | Ctrl+Scroll to zoom (Desktop)</p>
            </div>

            <button class="btn btn-download" id="downloadBtn" onclick="downloadPoster()" disabled>डाउनलोड करा</button>

            <div class="msg" id="msgBox"></div>
        </div>

        <div class="preview-panel">
            <h2>पोस्टर प्रीव्यू</h2>
            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="previewCanvas" width="1080" height="1920"></canvas>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('canvasWrapper');

        // Photo box: rounded rectangle
        const BOX = { x: 694, y: 1372, w: 314, h: 339, r: 40 };
        // Name banner interior
        const NAME_BOX = { x: 80, y: 1602, w: 555, h: 107 };
        const NAME_CENTER = { x: 357, y: 1655 };

        let templateImg = null;
        let templateMaleImg = null;
        let templateFemaleImg = null;
        let devoteeImg = null;

        // Image transform state
        let imgOffsetX = 0;
        let imgOffsetY = 0;
        let imgScale = 1;

        // Drag state
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let dragStartOffX = 0;
        let dragStartOffY = 0;

        // Load both templates
        let templatesLoaded = 0;
        function onTemplateLoad() {
            templatesLoaded++;
            if (templatesLoaded >= 2) {
                templateImg = templateMaleImg;
                render();
            }
        }
        templateMaleImg = new Image();
        templateMaleImg.onload = onTemplateLoad;
        templateMaleImg.src = 'template.png';

        templateFemaleImg = new Image();
        templateFemaleImg.onload = onTemplateLoad;
        templateFemaleImg.src = 'template-female.png';

        // Gender toggle
        document.querySelectorAll('input[name="gender"]').forEach(radio => {
            radio.addEventListener('change', function() {
                templateImg = this.value === 'female' ? templateFemaleImg : templateMaleImg;
                render();
            });
        });

        // Photo upload
        document.getElementById('devoteePhoto').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                devoteeImg = new Image();
                devoteeImg.onload = () => {
                    autoFit();
                    document.getElementById('photoPlaceholder').style.display = 'none';
                    document.getElementById('imageControls').classList.add('active');
                    render();
                };
                devoteeImg.src = evt.target.result;
            };
            reader.readAsDataURL(file);
        });

        function autoFit() {
            if (!devoteeImg) return;
            const scaleX = BOX.w / devoteeImg.width;
            const scaleY = BOX.h / devoteeImg.height;
            imgScale = Math.max(scaleX, scaleY);
            const drawW = devoteeImg.width * imgScale;
            const drawH = devoteeImg.height * imgScale;
            imgOffsetX = (BOX.w - drawW) / 2;
            imgOffsetY = (BOX.h - drawH) / 2;
            document.getElementById('zoomSlider').value = 100;
            updateZoomDisplay();
        }

        function getBaseScale() {
            const scaleX = BOX.w / devoteeImg.width;
            const scaleY = BOX.h / devoteeImg.height;
            return Math.max(scaleX, scaleY);
        }

        function updateZoomDisplay() {
            const slider = document.getElementById('zoomSlider');
            document.getElementById('zoomValue').textContent = slider.value + '%';
        }

        // Constrain image so it always covers the box (no empty gaps)
        function constrainOffset() {
            if (!devoteeImg) return;
            const drawW = devoteeImg.width * imgScale;
            const drawH = devoteeImg.height * imgScale;
            // Image must cover the entire box: left edge <= 0, right edge >= BOX.w
            if (drawW >= BOX.w) {
                imgOffsetX = Math.min(0, Math.max(BOX.w - drawW, imgOffsetX));
            } else {
                imgOffsetX = (BOX.w - drawW) / 2;
            }
            if (drawH >= BOX.h) {
                imgOffsetY = Math.min(0, Math.max(BOX.h - drawH, imgOffsetY));
            } else {
                imgOffsetY = (BOX.h - drawH) / 2;
            }
        }

        function applyZoom(newSliderVal) {
            if (!devoteeImg) return;
            const slider = document.getElementById('zoomSlider');
            newSliderVal = Math.max(50, Math.min(300, newSliderVal));
            slider.value = newSliderVal;
            updateZoomDisplay();

            const baseScale = getBaseScale();
            const newScale = baseScale * (newSliderVal / 100);

            const oldDrawW = devoteeImg.width * imgScale;
            const oldDrawH = devoteeImg.height * imgScale;
            const newDrawW = devoteeImg.width * newScale;
            const newDrawH = devoteeImg.height * newScale;

            // Zoom around the center of the current view
            const oldCenterX = imgOffsetX + oldDrawW / 2;
            const oldCenterY = imgOffsetY + oldDrawH / 2;
            imgOffsetX = oldCenterX - newDrawW / 2;
            imgOffsetY = oldCenterY - newDrawH / 2;
            imgScale = newScale;

            constrainOffset();
            render();
        }

        // Zoom slider
        document.getElementById('zoomSlider').addEventListener('input', function() {
            applyZoom(parseInt(this.value));
        });

        function resetImage() {
            if (!devoteeImg) return;
            autoFit();
            render();
        }

        function fitToFill() {
            if (!devoteeImg) return;
            const scaleX = BOX.w / devoteeImg.width;
            const scaleY = BOX.h / devoteeImg.height;
            imgScale = Math.max(scaleX, scaleY);
            const drawW = devoteeImg.width * imgScale;
            const drawH = devoteeImg.height * imgScale;
            imgOffsetX = (BOX.w - drawW) / 2;
            imgOffsetY = (BOX.h - drawH) / 2;
            document.getElementById('zoomSlider').value = 100;
            updateZoomDisplay();
            render();
        }

        // Drag to pan on canvas
        function getCanvasScale() {
            return canvas.width / wrapper.getBoundingClientRect().width;
        }

        wrapper.addEventListener('mousedown', (e) => {
            if (!devoteeImg) return;
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            dragStartOffX = imgOffsetX;
            dragStartOffY = imgOffsetY;
            wrapper.classList.add('dragging-photo');
            e.preventDefault();
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const scale = getCanvasScale();
            const dx = (e.clientX - dragStartX) * scale;
            const dy = (e.clientY - dragStartY) * scale;
            imgOffsetX = dragStartOffX + dx;
            imgOffsetY = dragStartOffY + dy;
            constrainOffset();
            render();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            wrapper.classList.remove('dragging-photo');
        });

        // Touch support — pan + pinch-to-zoom with scroll-intent detection
        let lastPinchDist = 0;
        let pinchStartScale = 1;
        let touchIntentDecided = false; // whether we've decided drag vs scroll
        let touchIsDrag = false;        // true = user wants to drag image, false = scrolling
        const DRAG_THRESHOLD = 8;       // px to move before deciding intent

        function getTouchDist(t1, t2) {
            const dx = t1.clientX - t2.clientX;
            const dy = t1.clientY - t2.clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        wrapper.addEventListener('touchstart', (e) => {
            if (!devoteeImg) return;
            if (e.touches.length === 1) {
                // Don't preventDefault here — allow scrolling by default
                const touch = e.touches[0];
                dragStartX = touch.clientX;
                dragStartY = touch.clientY;
                dragStartOffX = imgOffsetX;
                dragStartOffY = imgOffsetY;
                isDragging = false;
                touchIntentDecided = false;
                touchIsDrag = false;
                lastPinchDist = 0;
            } else if (e.touches.length === 2) {
                // Pinch always captures
                isDragging = false;
                touchIntentDecided = true;
                touchIsDrag = false;
                lastPinchDist = getTouchDist(e.touches[0], e.touches[1]);
                pinchStartScale = parseInt(document.getElementById('zoomSlider').value);
                e.preventDefault();
            }
        }, { passive: false });

        wrapper.addEventListener('touchmove', (e) => {
            if (!devoteeImg) return;

            // Two-finger pinch zoom
            if (e.touches.length === 2 && lastPinchDist > 0) {
                const newDist = getTouchDist(e.touches[0], e.touches[1]);
                const ratio = newDist / lastPinchDist;
                const newVal = Math.round(pinchStartScale * ratio);
                applyZoom(newVal);
                e.preventDefault();
                return;
            }

            if (e.touches.length !== 1) return;
            const touch = e.touches[0];
            const dx = touch.clientX - dragStartX;
            const dy = touch.clientY - dragStartY;

            // Decide intent on first significant movement
            if (!touchIntentDecided) {
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < DRAG_THRESHOLD) return; // not enough movement yet
                touchIntentDecided = true;
                // If mostly vertical → scroll, if horizontal or diagonal → drag image
                if (Math.abs(dy) > Math.abs(dx) * 1.5) {
                    touchIsDrag = false; // let the page scroll
                    return;
                } else {
                    touchIsDrag = true;
                    isDragging = true;
                }
            }

            if (!touchIsDrag || !isDragging) return;

            const scale = getCanvasScale();
            imgOffsetX = dragStartOffX + dx * scale;
            imgOffsetY = dragStartOffY + dy * scale;
            constrainOffset();
            render();
            e.preventDefault(); // only prevent scroll when we're dragging the image
        }, { passive: false });

        wrapper.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) {
                lastPinchDist = 0;
            }
            if (e.touches.length === 0) {
                isDragging = false;
                touchIntentDecided = false;
                touchIsDrag = false;
            }
        });

        // Mouse wheel — only capture if user holds Ctrl (zoom), otherwise let page scroll
        wrapper.addEventListener('wheel', (e) => {
            if (!devoteeImg) return;
            // Only hijack scroll when Ctrl is held (intentional zoom)
            // This lets normal scrolling pass through
            if (!e.ctrlKey) return;
            e.preventDefault();
            const slider = document.getElementById('zoomSlider');
            let val = parseInt(slider.value);
            val += e.deltaY < 0 ? 5 : -5;
            applyZoom(val);
        }, { passive: false });

        function roundedRectPath(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.arcTo(x + w, y, x + w, y + r, r);
            ctx.lineTo(x + w, y + h - r);
            ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
            ctx.lineTo(x + r, y + h);
            ctx.arcTo(x, y + h, x, y + h - r, r);
            ctx.lineTo(x, y + r);
            ctx.arcTo(x, y, x + r, y, r);
            ctx.closePath();
        }

        function render() {
            if (!templateImg || !templateImg.complete) return;

            const name = document.getElementById('devoteeName').value.trim();

            // Draw template
            ctx.drawImage(templateImg, 0, 0, 1080, 1920);

            // Draw devotee photo clipped to rounded rect
            if (devoteeImg) {
                ctx.save();
                roundedRectPath(ctx, BOX.x, BOX.y, BOX.w, BOX.h, BOX.r);
                ctx.clip();

                const drawW = devoteeImg.width * imgScale;
                const drawH = devoteeImg.height * imgScale;
                ctx.drawImage(
                    devoteeImg,
                    BOX.x + imgOffsetX,
                    BOX.y + imgOffsetY,
                    drawW,
                    drawH
                );
                ctx.restore();

                // Redraw template border around photo box so frame appears on top
                ctx.save();
                // Create a path that is the full canvas MINUS the photo box interior (inset by border width)
                ctx.beginPath();
                ctx.rect(0, 0, 1080, 1920);
                // Cut out a slightly smaller rounded rect (the photo interior)
                roundedRectPath(ctx, BOX.x + 4, BOX.y + 4, BOX.w - 8, BOX.h - 8, BOX.r - 4);
                ctx.clip('evenodd');
                ctx.drawImage(templateImg, 0, 0, 1080, 1920);
                ctx.restore();
            }

            // Draw name on the red banner
            if (name) {
                // Auto-size: start at 42px, shrink to fit within banner width
                let fontSize = 42;
                ctx.font = 'bold ' + fontSize + 'px "Segoe UI", Arial, sans-serif';
                while (ctx.measureText(name).width > NAME_BOX.w - 20 && fontSize > 16) {
                    fontSize--;
                    ctx.font = 'bold ' + fontSize + 'px "Segoe UI", Arial, sans-serif';
                }
                ctx.fillStyle = '#ffffff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 2;
                ctx.strokeText(name, NAME_CENTER.x, NAME_CENTER.y);
                ctx.fillText(name, NAME_CENTER.x, NAME_CENTER.y);
            }

            document.getElementById('downloadBtn').disabled = false;
        }

        function showMsg(text, type) {
            const box = document.getElementById('msgBox');
            box.textContent = text;
            box.className = 'msg ' + type;
            setTimeout(() => { box.className = 'msg'; }, 3000);
        }

        function downloadPoster() {
            const name = document.getElementById('devoteeName').value.trim() || 'poster';
            const link = document.createElement('a');
            link.download = 'Ramdhun_Rally_' + name.replace(/\s+/g, '_') + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            showMsg('पोस्टर डाउनलोड झाले!', 'success');
        }

        // Auto-render on text input
        document.getElementById('devoteeName').addEventListener('input', render);
    </script>
